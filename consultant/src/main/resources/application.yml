langchain4j:
  open-ai:
    chat-model:
      base-url: https://dashscope.aliyuncs.com/compatible-mode/v1
      api-key: sk-1db67f19237748bc80af719b2b90b979
      model-name: qwen-plus
      log-requests: true #请求日志输出#请求日志输出
      log-responses: true #响应日志输出
    streaming-chat-model:
      base-url: https://dashscope.aliyuncs.com/compatible-mode/v1
      api-key: sk-1db67f19237748bc80af719b2b90b979
      model-name: qwen-plus
      log-requests: true #请求日志输出
      log-responses: true #响应日志输出
    embedding-model:
      base-url: https://dashscope.aliyuncs.com/compatible-mode/v1
      api-key: sk-1db67f19237748bc80af719b2b90b979
      model-name: text-embedding-v3 #文本嵌入模型  text-embedding-v3要求最大处理长度为10个片段
      max-segments-per-batch: 10 #每次处理片段的个数,每次发送10个片段
      log-requests: true #请求日志输出
      log-responses: true #响应日志输出
  community:  #redissearch向量数据库配置,属于langchain4j
    redis:
      host: localhost
      port: 6379
logging:
  level:
      dev.langchain4j: debug
spring:
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/volunteer?useUnicode=true&characterEncoding=utf-8
    username: root
    password: root
  data:
    redis:
      host: localhost
      port: 6379
mybatis:
  configuration:
    map-underscore-to-camel-case: true #驼峰命名和下划线命令相互转化